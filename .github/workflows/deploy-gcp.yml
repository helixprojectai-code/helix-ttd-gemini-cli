# [FACT] GitHub Actions workflow for Cloud Run deployment
# [HYPOTHESIS] Manual fallback workflow for emergency deploys when Cloud Build is unavailable.
#
# Primary production path is Cloud Build trigger on main.

name: Deploy to Google Cloud Run

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: helix-ai-deploy
  SERVICE_NAME: constitutional-guardian
  REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/helix-ai-deploy/helix-repo/constitutional-guardian

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # [FACT] Authenticate to GCP
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          project_id: ${{ env.PROJECT_ID }}

      # [FACT] Setup Cloud SDK
      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      # [FACT] Setup Docker authentication
      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # [FACT] Create Artifact Registry repository if not exists
      - name: Setup Artifact Registry
        run: |
          gcloud artifacts repositories create helix-repo --repository-format=docker --location=us-central1 --project=${{ env.PROJECT_ID }} 2>/dev/null || true

      # [FACT] Build and push Docker image
      - name: Build and Push Container
        run: |
          echo "=== Building container ==="
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker build -t ${{ env.IMAGE }}:latest .

          echo "=== Pushing to Artifact Registry ==="
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # [FACT] Deploy to Cloud Run
      - name: Deploy to Cloud Run
        id: deploy
        run: |
          echo "=== Deploying to Cloud Run ==="
          RUNTIME_ENV_VARS="HELIX_NODE_ID=GCS-GUARDIAN,HELIX_ENV=production,GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},PUBSUB_TOPIC=projects/${{ env.PROJECT_ID }}/topics/helix-events,GEMINI_LIVE_MODEL=gemini-2.5-flash-native-audio-preview-12-2025,GEMINI_TEXT_MODEL=gemini-3.1-pro-preview,GEMINI_API_VERSION=v1beta"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 2 \
            --port 8180 \
            --update-env-vars "$RUNTIME_ENV_VARS" \
            --update-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest" \
            --quiet

          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')

          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "=== Deployment complete ==="
          echo "URL: $SERVICE_URL"

      # [FACT] Verify deployment
      - name: Verify Deployment
        run: |
          echo "=== Health check ==="
          sleep 10
          curl -s "${{ steps.deploy.outputs.service_url }}/health" || echo "Service starting up..."

      # [FACT] Stamp artifact metadata for the newly deployed revision.
      - name: Reset Artifact Verification Metadata
        run: |
          echo "=== Resolving deployed image digest ==="
          IMAGE_DIGEST=$(gcloud run revisions list             --service ${{ env.SERVICE_NAME }}             --region ${{ env.REGION }}             --project ${{ env.PROJECT_ID }}             --sort-by="~metadata.creationTimestamp"             --limit 1             --format='value(status.imageDigest)')

          echo "Deployed digest: $IMAGE_DIGEST"
          gcloud run services update ${{ env.SERVICE_NAME }}             --region ${{ env.REGION }}             --project ${{ env.PROJECT_ID }}             --update-env-vars "SECURITY_ARTIFACT_ANALYSIS_STATUS=unverified,SECURITY_ARTIFACT_ANALYSIS_TIMESTAMP=unavailable,SECURITY_ARTIFACT_IMAGE_URI=$IMAGE_DIGEST"             --quiet

      # [FACT] Output summary
      - name: Deployment Summary
        run: |
          echo ""
          echo "=========================================="
          echo "🦉⚓🦉 CONSTITUTIONAL GUARDIAN DEPLOYED"
          echo "=========================================="
          echo "Service: ${{ env.SERVICE_NAME }}"
          echo "Region: ${{ env.REGION }}"
          echo "URL: ${{ steps.deploy.outputs.service_url }}"
          echo "Image: ${{ env.IMAGE }}:${{ github.sha }}"
          echo "=========================================="
