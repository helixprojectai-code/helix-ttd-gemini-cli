# [FACT] GitHub Actions workflow for automated Cloud Run deployment
# [HYPOTHESIS] CI/CD automation improves deployment reliability and speed
# 
# AUTHENTICATION: Workload Identity Federation (no stored keys)
# More secure than Service Account Keys - uses OIDC tokens
#
# Required GitHub Secrets:
# - WORKLOAD_IDENTITY_PROVIDER: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
# - GCP_PROJECT_ID: helix-ai-deploy

name: Deploy to Google Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

env:
  PROJECT_ID: helix-ai-deploy
  SERVICE_NAME: constitutional-guardian
  REGION: us-central1

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # [FACT] Authenticate to GCP using Workload Identity Federation
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          project_id: ${{ env.PROJECT_ID }}
      
      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
      
      - name: Configure Docker
        run: gcloud auth configure-docker gcr.io --quiet
      
      # [FACT] Build and deploy
      - name: Build and Deploy
        run: |
          echo "=== Building container ==="
          gcloud builds submit \
            --tag gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --timeout=20m \
            --quiet
          
          echo "=== Deploying to Cloud Run ==="
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 2 \
            --port 8180 \
            --set-env-vars "HELIX_NODE_ID=GCS-GUARDIAN,HELIX_ENV=production,GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}" \
            --quiet
          
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $SERVICE_URL"
      
      - name: Verify Deployment
        run: |
          sleep 10
          curl -s "${{ steps.deploy.outputs.service_url }}/health" | jq .
