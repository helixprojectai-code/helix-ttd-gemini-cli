name: Audio Security Fast Checks

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'helix_code/audio_auditor.py'
      - 'helix_code/live_demo_server.py'
      - 'helix_code/tests/test_audio_auditor.py'
      - 'helix_code/tests/test_live_demo_server.py'
      - '.pre-commit-config.yaml'
      - 'pyproject.toml'

jobs:
  audio-security:
    name: Audio Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit pytest
          pip install -r helix_code/requirements.txt
          pip install -e .

      - name: Run targeted pre-commit hooks
        run: |
          pre-commit run mixed-line-ending --files \
            helix_code/audio_auditor.py \
            helix_code/live_demo_server.py \
            helix_code/tests/test_audio_auditor.py \
            helix_code/tests/test_live_demo_server.py
          pre-commit run black --files \
            helix_code/audio_auditor.py \
            helix_code/live_demo_server.py \
            helix_code/tests/test_audio_auditor.py \
            helix_code/tests/test_live_demo_server.py
          pre-commit run ruff --files \
            helix_code/audio_auditor.py \
            helix_code/live_demo_server.py \
            helix_code/tests/test_audio_auditor.py \
            helix_code/tests/test_live_demo_server.py
          pre-commit run mypy --files \
            helix_code/audio_auditor.py \
            helix_code/live_demo_server.py

      - name: Run targeted tests
        run: |
          pytest -q \
            helix_code/tests/test_audio_auditor.py \
            helix_code/tests/test_live_demo_server.py \
            helix_code/tests/test_live_guardian_extended.py
