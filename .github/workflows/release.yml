# [FACT] Publish helix-ttd-gemini to PyPI using Trusted Publishing (OIDC)
# [HYPOTHESIS] Automated releases on tag push reduce human error
# [ASSUMPTION] PyPI trusted publisher is configured for this repo

name: Release to PyPI

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.4.0

jobs:
  build-and-publish:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi  # Matches PyPI trusted publisher config
    permissions:
      id-token: write  # Required for OIDC trusted publishing
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package with twine
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed - uses OIDC trusted publishing
        with:
          print-hash: true
