name: Production Alert Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: helix-ai-deploy
  REGION: us-central1
  SERVICE_URL: https://constitutional-guardian-231586465188.us-central1.run.app
  ALERT_LOG_NAME: helix-production-alerts
  ALERT_STATE_GCS_URI: gs://helix-ai-deploy-receipts/ops/production-alert-state.json

jobs:
  check:
    name: Run Production Alert Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          project_id: ${{ env.PROJECT_ID }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Monitoring Publisher Dependency
        run: python -m pip install --upgrade google-cloud-logging

      - name: Restore Previous Alert State
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/helix-alerts"
          gcloud storage cp "$ALERT_STATE_GCS_URI" "$RUNNER_TEMP/helix-alerts/production-alert-state.json" || true

      - name: Validate Operator Token Secret
        id: token_check
        shell: bash
        env:
          HELIX_ADMIN_TOKEN: ${{ secrets.HELIX_ADMIN_TOKEN }}
        run: |
          set +e
          mkdir -p "$RUNNER_TEMP/helix-alerts"

          if [ -z "$HELIX_ADMIN_TOKEN" ]; then
            echo "token_status=missing" >> "$GITHUB_OUTPUT"
            cat > "$RUNNER_TEMP/helix-alerts/alert-summary.json" <<EOF
          {
            "evaluated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "service_url": "$SERVICE_URL",
            "overall_status": "page",
            "artifact_status": "unknown",
            "artifact_image": "unknown",
            "storage_backend": "unknown",
            "storage_mode": "unknown",
            "page_failures": [
              {
                "Check": "operator-token-secret",
                "Severity": "page",
                "Passed": false,
                "Details": "Repository secret HELIX_ADMIN_TOKEN is missing."
              }
            ],
            "warn_failures": [],
            "checks": [
              {
                "Check": "operator-token-secret",
                "Severity": "page",
                "Passed": false,
                "Details": "Repository secret HELIX_ADMIN_TOKEN is missing."
              }
            ]
          }
          EOF
            exit 0
          fi

          HTTP_CODE=$(curl -sS -o "$RUNNER_TEMP/helix-alerts/token-check-body.json" -w "%{http_code}"             -H "X-Helix-Admin-Token: $HELIX_ADMIN_TOKEN"             "$SERVICE_URL/api/runtime-config")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "token_status=ok" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "token_status=invalid" >> "$GITHUB_OUTPUT"
          cat > "$RUNNER_TEMP/helix-alerts/alert-summary.json" <<EOF
          {
            "evaluated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "service_url": "$SERVICE_URL",
            "overall_status": "page",
            "artifact_status": "unknown",
            "artifact_image": "unknown",
            "storage_backend": "unknown",
            "storage_mode": "unknown",
            "page_failures": [
              {
                "Check": "operator-token-secret",
                "Severity": "page",
                "Passed": false,
                "Details": "Repository secret HELIX_ADMIN_TOKEN failed preflight runtime-config auth with status $HTTP_CODE."
              }
            ],
            "warn_failures": [],
            "checks": [
              {
                "Check": "operator-token-secret",
                "Severity": "page",
                "Passed": false,
                "Details": "Repository secret HELIX_ADMIN_TOKEN failed preflight runtime-config auth with status $HTTP_CODE."
              }
            ]
          }
          EOF
          exit 0

      - name: Run Alert Checker
        id: checker
        if: steps.token_check.outputs.token_status == 'ok'
        shell: bash
        env:
          HELIX_ADMIN_TOKEN: ${{ secrets.HELIX_ADMIN_TOKEN }}
        run: |
          set +e
          pwsh -File tools/check-production-alerts.ps1             -ServiceUrl "$SERVICE_URL"             -AdminToken "$HELIX_ADMIN_TOKEN"             -StateFile "$RUNNER_TEMP/helix-alerts/production-alert-state.json"             -JsonOutput "$RUNNER_TEMP/helix-alerts/alert-summary.json"
          CHECK_EXIT=$?
          echo "check_exit=$CHECK_EXIT" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Persist Updated Alert State
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/helix-alerts/production-alert-state.json" ]; then
            gcloud storage cp "$RUNNER_TEMP/helix-alerts/production-alert-state.json" "$ALERT_STATE_GCS_URI"
          fi

      - name: Publish Alert Summary to Cloud Logging
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/helix-alerts/alert-summary.json" ]; then
            python tools/publish-monitoring-snapshot.py               --input "$RUNNER_TEMP/helix-alerts/alert-summary.json"               --log-name "$ALERT_LOG_NAME"
          fi

      - name: Job Summary
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/helix-alerts/alert-summary.json" ]; then
            echo "## Production Alert Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat "$RUNNER_TEMP/helix-alerts/alert-summary.json" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Report Alert Check Outcome
        if: steps.checker.outputs.check_exit == '1' || steps.checker.outputs.check_exit == '2'
        run: |
          echo "Production alert check reported alert conditions."
          echo "See the job summary and Cloud Logging log '$ALERT_LOG_NAME' for details."

      - name: Fail On Invalid Operator Token Secret
        if: steps.token_check.outputs.token_status != 'ok'
        run: |
          echo "Production alert check could not authenticate with repository secret HELIX_ADMIN_TOKEN."
          echo "Update the repository secret to the current production operator token."
          exit 1
