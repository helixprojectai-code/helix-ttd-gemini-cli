# Helix-TTD Python Toolkit — Full CI Pipeline
# Constitutional governance + multi-version matrix testing
# Version: 1.0.0
# License: Apache-2.0

name: Helix-TTD Full CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'helix_code/**'
      - 'tools/**'
      - 'helix_ttd_claw/**'
      - '.github/workflows/ci.yml'
      - 'pyproject.toml'
      - 'setup.py'
      - '.gitattributes'
  pull_request:
    branches: [main]
    paths:
      - 'helix_code/**'
      - 'tools/**'
      - 'helix_ttd_claw/**'
      - '.github/workflows/ci.yml'
      - 'pyproject.toml'
      - 'setup.py'
      - '.gitattributes'

env:
  FORCE_COLOR: 1
  PYTHONUNBUFFERED: 1
  # Force LF line endings for consistent cross-platform behavior
  GIT_CONFIG_GLOBAL: "core.autocrlf=false"

jobs:
  # ============================================================
  # STAGE 1: Constitutional Pre-Flight
  # ============================================================
  constitutional-gate:
    name: 🏛️ Constitutional Gate
    runs-on: ubuntu-latest
    outputs:
      compliance-status: ${{ steps.compliance-check.outputs.status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Constitutional Compliance Check
        id: compliance-check
        run: |
          echo "=== HELIX-TTD CONSTITUTIONAL COMPLIANCE GATE ==="

          # Check for epistemic labeling in new/modified Python files
          VIOLATIONS=0

          # Pattern: [FACT], [HYPOTHESIS], [ASSUMPTION] must appear in docstrings
          for file in $(find helix_code tools -name "*.py" -type f); do
            if ! grep -qE '\[FACT\]|\[HYPOTHESIS\]|\[ASSUMPTION\]' "$file" 2>/dev/null; then
              if ! grep -q '""".*"""' "$file" 2>/dev/null; then
                echo "⚠️  WARNING: $file missing docstring with epistemic labels"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi
          done

          # Check for prohibited patterns (imperative tone toward humans)
          if grep -rE 'You must|You should|You need to|Always do' helix_code/ tools/ 2>/dev/null; then
            echo "❌ CONSTITUTIONAL VIOLATION: Imperative tone detected"
            VIOLATIONS=$((VIOLATIONS + 10))
          fi

          if [ $VIOLATIONS -eq 0 ]; then
            echo "✅ Constitutional compliance: PASSED"
            echo "status=PASS" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Constitutional compliance: $VIOLATIONS minor issues (non-blocking)"
            echo "status=WARN" >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # STAGE 2: Lint & Format
  # ============================================================
  lint:
    name: 🧹 Lint & Format
    runs-on: ubuntu-latest
    needs: constitutional-gate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install ruff black==24.1.1 isort

      - name: Verify LF line endings
        run: |
          echo "=== VERIFYING LINE ENDINGS ==="
          # Check for CRLF in Python files
          if grep -rI $'\r' helix_code/ tools/ 2>/dev/null; then
            echo "❌ ERROR: CRLF line endings detected"
            exit 1
          else
            echo "✅ All files have LF line endings"
          fi

      - name: Check imports (isort)
        run: |
          isort --check-only --diff --profile black --line-length 100 helix_code/ tools/

      - name: Check formatting (black)
        run: |
          black --check --diff --line-length 100 helix_code/ tools/

      - name: Lint with Ruff
        run: |
          ruff check helix_code/ tools/

  # ============================================================
  # STAGE 3: Test Matrix
  # ============================================================
  test:
    name: 🧪 Test Matrix
    runs-on: ${{ matrix.os }}
    needs: lint
    continue-on-error: ${{ matrix.python-version == '3.12' }}
    timeout-minutes: 10  # [FACT] Prevent hangs like macOS 3.10 ARM64 setup issue
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
        dbc_mode: ['secure', 'insecure']
        # [FACT] Exclude macOS 3.10 due to actions/setup-python hang on ARM64
        # [HYPOTHESIS] GitHub's macOS-latest (ARM64) has Python 3.10 provisioning issues
        # [ASSUMPTION] macOS 3.11/3.12 coverage is sufficient for Darwin platform
        exclude:
          - os: macos-latest
            python-version: '3.10'
        include:
          - python-version: '3.11'
            os: ubuntu-latest
            coverage: true
            dbc_mode: 'secure'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-xdist
          pip install cryptography
          pip install -r helix_code/requirements.txt
          pip install -e helix_code/

      - name: Run tests
        shell: bash
        env:
          HELIX_DBC_ENC_KEY: ${{ matrix.dbc_mode == 'secure' && 'ci_dummy_enc_key' || '' }}
          HELIX_ALLOW_INSECURE_DBC: ${{ matrix.dbc_mode == 'insecure' && '1' || '' }}
        run: |
          python -m pytest helix_code/tests/ -v --tb=short \
            --ignore='System Volume Information' \
            --ignore='D:/System Volume Information' \
            --ignore='C:/System Volume Information' \
            ${{ matrix.coverage && '--cov=helix_code --cov-report=xml --cov-report=term' || '' }}

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================
  # STAGE 4: Helix-Specific Verification
  # ============================================================
  helix-verification:
    name: 🔬 Helix-TTD Verification
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Helix toolkit
        run: |
          pip install -e helix_code/

      - name: Validate Constitutional Grammar
        run: |
          echo "=== VALIDATING CONSTITUTIONAL GRAMMAR ==="
          cd helix_code && python -c "
          from constitutional_compliance import validate_file
          import os

          errors = 0
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.endswith('.py') and file != 'constitutional_compliance.py':
                      filepath = os.path.join(root, file)
                      result = validate_file(filepath)
                      if not result['valid']:
                          print(f'❌ {filepath}: {result[\"errors\"]}')
                          errors += 1

          if errors > 0:
              print(f'\n❌ {errors} files failed constitutional validation')
              exit(1)
          else:
              print('✅ All files pass constitutional validation')
          "

      - name: Verify RPI Anchors
        run: |
          echo "=== VERIFYING RPI ANCHOR CONSISTENCY ==="
          if [ -f ".helix/SESSION_LEDGER.md" ]; then
            echo "✅ Session ledger present"
            grep -c "RPI-" .helix/SESSION_LEDGER.md && echo "RPI entries found"
          else
            echo "⚠️  No session ledger found"
          fi

      - name: Check Epistemic Labeling
        run: |
          echo "=== CHECKING EPISTEMIC LABEL INTEGRITY ==="
          LABEL_COUNT=$(grep -rE '\[FACT\]|\[HYPOTHESIS\]|\[ASSUMPTION\]' helix_code/ tools/ 2>/dev/null | wc -l)
          echo "Found $LABEL_COUNT epistemic labels"
          if [ $LABEL_COUNT -lt 10 ]; then
            echo "⚠️  Warning: Low epistemic label count"
          else
            echo "✅ Epistemic labeling adequate"
          fi

  # ============================================================
  # STAGE 5: Build & Package
  # ============================================================
  build:
    name: 📦 Build Package
    runs-on: ubuntu-latest
    needs: [test, helix-verification]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          pip install build twine check-wheel-contents

      - name: Build package
        run: |
          cd helix_code && python -m build

      - name: Check wheel contents
        continue-on-error: true
        run: |
          cd helix_code && check-wheel-contents dist/*.whl || echo "⚠️ Wheel check warnings (non-blocking)"

      - name: Check with twine
        run: |
          cd helix_code && twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helix-ttd-package
          path: helix_code/dist/
          retention-days: 30

  # ============================================================
  # STAGE 6: Integration Test (Tools)
  # ============================================================
  integration-tools:
    name: 🔧 Integration Test (Tools)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install toolkit
        run: |
          pip install -e helix_code/

      - name: Test CLI entry point
        run: |
          helix --help

      - name: Test evac_daemon imports
        continue-on-error: true
        run: |
          python -c "import sys; sys.path.insert(0, 'tools'); import evac_daemon" || echo "⚠️ evac_daemon requires watchdog (optional dependency)"

      - name: Test nexus_ingest imports
        continue-on-error: true
        run: |
          python -c "import sys; sys.path.insert(0, 'tools'); import nexus_ingest" || echo "⚠️ nexus_ingest has optional dependencies"

  # ============================================================
  # STAGE 7: Summary
  # ============================================================
  ci-summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [constitutional-gate, lint, test, helix-verification, build, integration-tools]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "# 🧬 Helix-TTD CI Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🏛️ Constitutional Gate | ${{ needs.constitutional-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧹 Lint & Format | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Test Matrix | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔬 Helix Verification | ${{ needs.helix-verification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Build Package | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Integration Test | ${{ needs.integration-tools.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
