<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helix-TTD Live Multimodal Auditing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .control-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .mic-button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 2rem;
            cursor: pointer;
            display: block;
            margin: 0 auto 20px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }

        .mic-button:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.4);
        }

        .mic-button.recording {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        .status.connected {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            color: #00d4ff;
        }

        .status.recording {
            background: rgba(255, 65, 108, 0.1);
            border: 1px solid #ff416c;
            color: #ff416c;
        }

        .status.error {
            background: rgba(255, 75, 43, 0.1);
            border: 1px solid #ff4b2b;
            color: #ff4b2b;
        }

        .transcription-log {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }

        .log-entry {
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            background: rgba(255,255,255,0.03);
        }

        .log-entry.intervention {
            border-left-color: #ff416c;
            background: rgba(255, 65, 108, 0.1);
        }

        .log-entry.valid {
            border-left-color: #00d4ff;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 6px;
        }

        .log-text {
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge.fact {
            background: #00d4ff;
            color: #000;
        }

        .badge.drift-e {
            background: #ff416c;
            color: #fff;
        }

        .badge.drift-a {
            background: #ff4b2b;
            color: #fff;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
        }

        .webrtc-warning {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid #ffc107;
            color: #ffc107;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
        }

        .config-panel {
            margin-bottom: 16px;
        }

        .config-panel label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #aaa;
        }

        .config-panel input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 0.9rem;
        }

        button.action-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        button.action-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Live Multimodal Auditing</h1>
        <p class="subtitle">Real-time audio transcription with constitutional validation</p>

        <div class="webrtc-warning" id="webrtc-warning">
            ⚠️ WebRTC not supported. Please use a modern browser (Chrome, Firefox, Edge).
        </div>

        <div class="control-panel">
            <div class="config-panel">
                <label>WebSocket URL</label>
                <input type="text" id="ws-url" value="ws://localhost:8000/audio-audit" />
            </div>

            <button class="mic-button" id="mic-btn">🎤</button>

            <div class="status" id="status">Click to connect and start recording</div>

            <div class="controls">
                <button class="action-btn" id="connect-btn">Connect</button>
                <button class="action-btn" id="clear-btn">Clear Log</button>
                <button class="action-btn" id="stats-btn">Get Stats</button>
            </div>
        </div>

        <div class="transcription-log" id="log">
            <div style="text-align: center; color: #666; padding: 40px;">
                Transcriptions will appear here...
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="stat-chunks">0</div>
                <div class="stat-label">Audio Chunks</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-segments">0</div>
                <div class="stat-label">Transcriptions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-interventions">0</div>
                <div class="stat-label">Interventions</div>
            </div>
        </div>
    </div>

    <script>
        // [FACT] Live Multimodal Auditing Client
        // [HYPOTHESIS] 16kHz PCM mono provides optimal quality/latency tradeoff

        class AudioAuditor {
            constructor() {
                this.ws = null;
                this.audioContext = null;
                this.processor = null;
                this.stream = null;
                this.isRecording = false;
                this.chunkCount = 0;
                this.segmentCount = 0;
                this.interventionCount = 0;
            }

            async connect(url) {
                return new Promise((resolve, reject) => {
                    this.ws = new WebSocket(url);

                    this.ws.onopen = () => {
                        console.log('[FACT] WebSocket connected');
                        updateStatus('connected', 'Connected. Ready to record.');
                        resolve();
                    };

                    this.ws.onmessage = (event) => {
                        this.handleMessage(JSON.parse(event.data));
                    };

                    this.ws.onerror = (error) => {
                        console.error('[ERROR] WebSocket error:', error);
                        updateStatus('error', 'Connection error');
                        reject(error);
                    };

                    this.ws.onclose = () => {
                        console.log('[FACT] WebSocket closed');
                        updateStatus('error', 'Disconnected');
                        this.stopRecording();
                    };
                });
            }

            handleMessage(data) {
                const { type } = data;

                switch (type) {
                    case 'connected':
                        addLogEntry('system', data.message);
                        break;

                    case 'transcription':
                        addLogEntry('transcription', data.text, {
                            confidence: data.confidence,
                            receiptId: data.receipt_id
                        });
                        break;

                    case 'validation':
                        this.segmentCount++;
                        updateStat('segments', this.segmentCount);

                        if (data.intervention) {
                            this.interventionCount++;
                            updateStat('interventions', this.interventionCount);
                            addLogEntry('intervention', data.text, {
                                driftCode: data.drift_code,
                                receiptId: data.receipt_id
                            });
                        } else {
                            addLogEntry('valid', data.text, {
                                receiptId: data.receipt_id
                            });
                        }
                        break;

                    case 'intervention':
                        addLogEntry('intervention', data.original, {
                            driftCode: data.drift_code,
                            message: data.message
                        });
                        break;

                    case 'audio_ack':
                        this.chunkCount++;
                        updateStat('chunks', this.chunkCount);
                        break;

                    case 'stats':
                        console.log('[FACT] Session stats:', data.stats);
                        break;

                    case 'pong':
                        // Heartbeat response
                        break;
                }
            }

            async startRecording() {
                if (!this.ws || this.ws.readyState !== WebSocket.OPEN) {
                    throw new Error('WebSocket not connected');
                }

                // [FACT] Request microphone access
                this.stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });

                // [FACT] Create audio context at 16kHz
                this.audioContext = new AudioContext({ sampleRate: 16000 });
                const source = this.audioContext.createMediaStreamSource(this.stream);

                // [FACT] ScriptProcessor for raw PCM access
                // [HYPOTHESIS] 4096 buffer size provides ~256ms chunks at 16kHz
                this.processor = this.audioContext.createScriptProcessor(4096, 1, 1);

                this.processor.onaudioprocess = (e) => {
                    if (!this.isRecording) return;

                    const inputData = e.inputBuffer.getChannelData(0);

                    // [FACT] Convert Float32 to Int16 PCM
                    const pcmData = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                    }

                    // [FACT] Encode to base64 and send
                    const bytes = new Uint8Array(pcmData.buffer);
                    const base64 = btoa(String.fromCharCode(...bytes));

                    this.ws.send(JSON.stringify({
                        type: 'audio',
                        data: base64,
                        timestamp: Date.now()
                    }));
                };

                source.connect(this.processor);
                this.processor.connect(this.audioContext.destination);

                this.isRecording = true;
                updateStatus('recording', '🎙️ Recording... Speak now');

                // [FACT] Start heartbeat
                this.heartbeatInterval = setInterval(() => {
                    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                        this.ws.send(JSON.stringify({ type: 'ping' }));
                    }
                }, 30000);
            }

            stopRecording() {
                this.isRecording = false;

                if (this.processor) {
                    this.processor.disconnect();
                    this.processor = null;
                }

                if (this.audioContext) {
                    this.audioContext.close();
                    this.audioContext = null;
                }

                if (this.stream) {
                    this.stream.getTracks().forEach(t => t.stop());
                    this.stream = null;
                }

                if (this.heartbeatInterval) {
                    clearInterval(this.heartbeatInterval);
                    this.heartbeatInterval = null;
                }

                updateStatus('connected', 'Recording stopped. Ready to record.');
            }

            disconnect() {
                this.stopRecording();
                if (this.ws) {
                    this.ws.close();
                    this.ws = null;
                }
            }

            getStats() {
                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify({ type: 'get_stats' }));
                }
            }
        }

        // [FACT] UI Helpers
        const auditor = new AudioAuditor();

        function updateStatus(state, message) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status ' + state;
            statusEl.textContent = message;
        }

        function updateStat(name, value) {
            document.getElementById(`stat-${name}`).textContent = value;
        }

        function addLogEntry(type, text, meta = {}) {
            const logEl = document.getElementById('log');

            // Clear placeholder on first entry
            if (logEl.children.length === 1 && logEl.children[0].style.textAlign === 'center') {
                logEl.innerHTML = '';
            }

            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;

            const timestamp = new Date().toLocaleTimeString();
            let badge = '';

            if (type === 'intervention') {
                const driftCode = meta.driftCode || 'UNKNOWN';
                badge = `<span class="badge drift-${driftCode.toLowerCase()}">DRIFT-${driftCode}</span>`;
            } else if (type === 'valid') {
                badge = '<span class="badge fact">✓ VALID</span>';
            }

            entry.innerHTML = `
                <div class="log-header">
                    <span>${timestamp}</span>
                    <span>${badge}</span>
                </div>
                <div class="log-text">${escapeHtml(text)}</div>
                ${meta.receiptId ? `<div style="font-size: 0.75rem; color: #666; margin-top: 6px;">Receipt: ${meta.receiptId}</div>` : ''}
            `;

            logEl.prepend(entry);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // [FACT] Event Listeners
        document.getElementById('connect-btn').addEventListener('click', async () => {
            const url = document.getElementById('ws-url').value;
            try {
                await auditor.connect(url);
            } catch (e) {
                console.error('Failed to connect:', e);
            }
        });

        document.getElementById('mic-btn').addEventListener('click', async () => {
            const btn = document.getElementById('mic-btn');

            if (!auditor.ws || auditor.ws.readyState !== WebSocket.OPEN) {
                updateStatus('error', 'Not connected. Click Connect first.');
                return;
            }

            if (auditor.isRecording) {
                auditor.stopRecording();
                btn.classList.remove('recording');
                btn.textContent = '🎤';
            } else {
                try {
                    await auditor.startRecording();
                    btn.classList.add('recording');
                    btn.textContent = '⏹️';
                } catch (e) {
                    console.error('Failed to start recording:', e);
                    updateStatus('error', 'Microphone access denied');
                }
            }
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            document.getElementById('log').innerHTML = `
                <div style="text-align: center; color: #666; padding: 40px;">
                    Transcriptions will appear here...
                </div>
            `;
        });

        document.getElementById('stats-btn').addEventListener('click', () => {
            auditor.getStats();
        });

        // [FACT] Check WebRTC support
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            document.getElementById('webrtc-warning').style.display = 'block';
        }

        // [FACT] Auto-connect on load
        window.addEventListener('load', () => {
            const url = document.getElementById('ws-url').value;
            auditor.connect(url).catch(() => {
                // Silent fail - user can manually connect
            });
        });
    </script>
</body>
</html>
