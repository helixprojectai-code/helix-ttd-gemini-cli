# [FACT] Google Cloud Build configuration for Constitutional Guardian
# [HYPOTHESIS] Automated CI/CD improves deployment reliability
# [ASSUMPTION] Cloud Build triggers on push to main branch

steps:
  # [FACT] Emit transparency metadata from deploy-time context.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'emit-security-metadata'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        date -u +"%Y-%m-%dT%H:%M:%SZ" > /workspace/security_scan_timestamp.txt
        echo "CI gated on main" > /workspace/security_test_status.txt

  # [FACT] Build container image with a tag that works for trigger and manual builds.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        IMAGE_TAG="$${COMMIT_SHA:-}"
        if [[ -z "$$IMAGE_TAG" ]]; then
          IMAGE_TAG="$${BUILD_ID:-manual}"
        fi
        IMAGE_BASE="us-central1-docker.pkg.dev/$PROJECT_ID/helix-repo/constitutional-guardian"
        docker build \
          -t "$$IMAGE_BASE:$$IMAGE_TAG" \
          -t "$$IMAGE_BASE:latest" \
          .

  # [FACT] Push both immutable and latest tags.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        IMAGE_TAG="$${COMMIT_SHA:-}"
        if [[ -z "$$IMAGE_TAG" ]]; then
          IMAGE_TAG="$${BUILD_ID:-manual}"
        fi
        IMAGE_BASE="us-central1-docker.pkg.dev/$PROJECT_ID/helix-repo/constitutional-guardian"
        docker push "$$IMAGE_BASE:$$IMAGE_TAG"
        docker push "$$IMAGE_BASE:latest"

  # [FACT] Deploy to Cloud Run with explicit runtime + transparency env.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-cloud-run'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        IMAGE_TAG="$${COMMIT_SHA:-}"
        if [[ -z "$$IMAGE_TAG" ]]; then
          IMAGE_TAG="$${BUILD_ID:-manual}"
        fi
        TEST_STATUS="$(cat /workspace/security_test_status.txt)"
        SCAN_TS="$(cat /workspace/security_scan_timestamp.txt)"

        IMAGE_BASE="us-central1-docker.pkg.dev/$PROJECT_ID/helix-repo/constitutional-guardian"

        gcloud run deploy constitutional-guardian \
          --image "$$IMAGE_BASE:$$IMAGE_TAG" \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --memory 1Gi \
          --cpu 2 \
          --concurrency 50 \
          --timeout 300 \
          --max-instances 10 \
          --set-env-vars "^~^HELIX_NODE_ID=GCS-GUARDIAN~HELIX_ENV=production~GOOGLE_CLOUD_PROJECT=$PROJECT_ID~PUBSUB_TOPIC=projects/$PROJECT_ID/topics/helix-events~GEMINI_LIVE_MODEL=gemini-2.5-flash-native-audio-preview-12-2025~GEMINI_TEXT_MODEL=gemini-3.1-pro-preview~GEMINI_API_VERSION=v1beta~SECURITY_SCAN_TIMESTAMP=$$SCAN_TS~SECURITY_TEST_STATUS=$$TEST_STATUS~SECURITY_POSTURE_SCORE=90+~SECURITY_CHECK_BANDIT=passing~SECURITY_CHECK_RUFF=passing~SECURITY_CHECK_MYPY=passing~SECURITY_CHECK_BLACK=passing~SECURITY_CHECK_ISORT=passing~SECURITY_CHECK_PRE_COMMIT=passing" \
          --set-secrets GEMINI_API_KEY=GEMINI_API_KEY:latest

# [FACT] Cloud Build options
options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'

timeout: 1800s
