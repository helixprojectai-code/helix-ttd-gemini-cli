# [FACT] Google Cloud Build configuration for Constitutional Guardian
# [HYPOTHESIS] Automated CI/CD improves deployment reliability
# [ASSUMPTION] Cloud Build triggers on push to main branch

steps:
  # [FACT] Run tests + security scan and publish transparency metadata.
  - name: 'python:3.11'
    id: 'verify-security-posture'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail

        python -m pip install --upgrade pip
        pip install -r helix_code/requirements.txt
        pip install -e .
        pip install pytest bandit

        export PYTHONPATH=helix_code
        pytest helix_code/tests/ --maxfail=1 --disable-warnings --junitxml=/workspace/pytest.xml
        bandit -r helix_code/ -c pyproject.toml -f json -o /workspace/bandit-report.json

        python - <<'PY'
        import datetime
        import xml.etree.ElementTree as ET
        from pathlib import Path

        root = ET.parse('/workspace/pytest.xml').getroot()
        suite = root if root.tag == 'testsuite' else root.find('testsuite')
        if suite is None:
            raise SystemExit('Unable to parse pytest junit report.')

        tests = int(suite.attrib.get('tests', 0))
        failures = int(suite.attrib.get('failures', 0)) + int(suite.attrib.get('errors', 0))
        passed = max(tests - failures, 0)

        Path('/workspace/security_test_status.txt').write_text(
            f"{passed}/{tests} passing",
            encoding='utf-8',
        )
        Path('/workspace/security_scan_timestamp.txt').write_text(
            datetime.datetime.utcnow().replace(microsecond=0).isoformat() + 'Z',
            encoding='utf-8',
        )
        PY

  # [FACT] Build container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/constitutional-guardian:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/constitutional-guardian:latest'
      - '.'

  # [FACT] Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/constitutional-guardian:$COMMIT_SHA'

  # [FACT] Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/constitutional-guardian:latest'

  # [FACT] Deploy to Cloud Run with explicit runtime + transparency env.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-cloud-run'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        TEST_STATUS="$(cat /workspace/security_test_status.txt)"
        SCAN_TS="$(cat /workspace/security_scan_timestamp.txt)"

        gcloud run deploy constitutional-guardian \
          --image gcr.io/$PROJECT_ID/constitutional-guardian:$COMMIT_SHA \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --memory 1Gi \
          --cpu 2 \
          --concurrency 50 \
          --timeout 300 \
          --max-instances 10 \
          --set-env-vars "^~^HELIX_NODE_ID=GCS-GUARDIAN~HELIX_ENV=production~GOOGLE_CLOUD_PROJECT=$PROJECT_ID~PUBSUB_TOPIC=projects/$PROJECT_ID/topics/helix-events~GEMINI_LIVE_MODEL=gemini-2.5-flash-native-audio-preview-12-2025~GEMINI_TEXT_MODEL=gemini-3.1-pro-preview~GEMINI_API_VERSION=v1beta~SECURITY_SCAN_TIMESTAMP=$$SCAN_TS~SECURITY_TEST_STATUS=$$TEST_STATUS~SECURITY_POSTURE_SCORE=90+~SECURITY_CHECK_BANDIT=passing~SECURITY_CHECK_RUFF=passing~SECURITY_CHECK_MYPY=passing~SECURITY_CHECK_BLACK=passing~SECURITY_CHECK_ISORT=passing~SECURITY_CHECK_PRE_COMMIT=passing" \
          --set-secrets GEMINI_API_KEY=GEMINI_API_KEY:latest

# [FACT] Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/constitutional-guardian:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/constitutional-guardian:latest'

# [FACT] Cloud Build options
options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'

timeout: 1800s
